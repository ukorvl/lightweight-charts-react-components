name: Release
# Create a tag with a valid SemVer version number
# and then run this workflow to release a new version of the library
# and deploy the examples to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy-examples:
        description: "Deploy the examples to GitHub Pages"
        required: false
        default: "true"
      dry-run:
        description: "Run checks and tests without publishing a release or deploying examples"
        required: false
        default: "false"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  check-semver-tag:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.check-semver-tag.outputs.tag_name }}
    steps:
      - name: Check semver tag
        id: check-semver-tag
        run: |
          TAG_NAME=${GITHUB_REF##*/}
          echo "Checking if the tag $TAG_NAME is a valid SemVer tag..."

          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: Tag $TAG_NAME is not a valid SemVer tag"
            exit 1
          fi

          echo "The tag $TAG_NAME is a valid SemVer tag."

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
        shell: bash

  validate-release-metadata:
    name: Validate release metadata
    needs: check-semver-tag
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check Changelog
        uses: ukorvl/custom-github-actions/check-version-changelog@5cd8d8ee71202c54b29d61148fafb76a3a014519 # v1.1
        with:
          PACKAGE_JSON: "lib/package.json"
          CHANGELOG_FILE: "lib/CHANGELOG.md"

      - name: Check versions in sync
        uses: ./.github/actions/check-versions-in-sync
        with:
          PACKAGE_JSON: lib/package.json
          JSR_JSON: lib/jsr.json
          VERSION_FILE: lib/src/version.ts

  lint:
    name: Lint
    needs: check-semver-tag
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: false

  test-lib:
    name: Test lib
    needs: check-semver-tag
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Build
        uses: ./.github/actions/build

      - name: Test lib
        uses: ./.github/actions/test-lib
        with:
          upload-coverage: false
          coverage-report: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test-examples-unit:
    name: Test examples unit
    needs: check-semver-tag
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Build
        uses: ./.github/actions/build

      - name: Run examples unit tests
        working-directory: examples
        run: npm run test:unit
        shell: bash

  test-e2e:
    name: Release E2E tests
    needs: check-semver-tag
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ukorvl/custom-github-actions-playwright:latest@sha256:2b6d906960e2d2a9a9980a309ca8182bf319ada617bd25b27dc40d6e83ced409
      options: --user pwuser
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: false # don't need to setup node, it's already in the container

      - name: Build
        uses: ./.github/actions/build

      - name: Run E2E tests
        working-directory: examples
        run: |
          export CI=true
          export DISABLE_EXTERNAL_LINK_TEST=false
          npm run test:e2e
        shell: bash

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: examples/tests/e2e/output/playwright-report
          if-no-files-found: "warn"
          retention-days: 30

  test-lighthouse:
    name: Release Lighthouse tests
    needs: check-semver-tag
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ukorvl/custom-github-actions-playwright:latest@sha256:2b6d906960e2d2a9a9980a309ca8182bf319ada617bd25b27dc40d6e83ced409
      options: --user pwuser
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: false # don't need to setup node, it's already in the container

      - name: Build
        uses: ./.github/actions/build

      - name: Run Lighthouse tests
        working-directory: examples
        run: |
          export CI=true
          npm run test:lighthouse
        shell: bash

  release:
    needs:
      - check-semver-tag
      - validate-release-metadata
      - lint
      - test-lib
      - test-examples-unit
      - test-e2e
      - test-lighthouse
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Build
        uses: ./.github/actions/build

      - name: Create a new release
        uses: ./.github/actions/create-release
        with:
          tag: ${{ needs.check-semver-tag.outputs.tag_name }}
          dry-run: ${{ github.event.inputs['dry-run'] }}

  deploy:
    if: ${{ github.event.inputs['dry-run'] != 'true' && github.event.inputs['deploy-examples'] != 'false' }}
    name: Deploy examples
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: release
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Build deployable examples
        uses: ./.github/actions/build
        with:
          base-path: /lightweight-charts-react-components
          deploy: true

      - name: Deploy
        uses: ./.github/actions/deploy-examples
        with:
          keep-files: true
          branch: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}
