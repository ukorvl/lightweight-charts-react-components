name: Check Changelog

# This workflow ensures that the changelog is updated whenever the package.json version is updated

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-changelog:
    name: Check Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check Changelog
        uses: ukorvl/custom-github-actions/check-version-changelog@5cd8d8ee71202c54b29d61148fafb76a3a014519 # v1.1
        with:
          PACKAGE_JSON: "lib/package.json"
          CHANGELOG_FILE: "lib/CHANGELOG.md"
