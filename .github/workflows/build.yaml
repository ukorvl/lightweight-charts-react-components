name: Build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-lint:
    name: Lint code
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: ${{ github.event_name == 'pull_request' }}
          commit_base_sha: ${{ github.event.pull_request.base.sha || '' }}

  test-lib:
    name: Build and test lib
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Build
        uses: ./.github/actions/build

      - name: Test
        uses: ./.github/actions/test-lib
        with:
          upload-coverage: ${{ github.event_name == 'push' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          coverage-report: ${{ github.event_name == 'pull_request' }}

  test-examples:
    name: Unit test examples
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Run examples unit tests
        working-directory: examples
        run: npm run test:unit

  test-bench:
    name: Benchmark tests
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Benchmark
        uses: ./.github/actions/bench
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # runs heavy E2E tests for the examples subdirectory (+ container setup)
  test-e2e:
    name: E2E Tests (shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ukorvl/custom-github-actions-playwright:latest@sha256:2b6d906960e2d2a9a9980a309ca8182bf319ada617bd25b27dc40d6e83ced409
      options: --user pwuser
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3, 4]
        shardTotal: [4]
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: false # don't need to setup node, it's already in the container

      - name: Build
        uses: ./.github/actions/build

      - name: Run E2E tests
        working-directory: examples
        run: |
          export CI=true
          export PLAYWRIGHT_BLOB_REPORT=true
          npm run test:e2e -- --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: blob-report-${{ matrix.shardIndex }}
          path: examples/tests/e2e/output/blob-report
          if-no-files-found: "warn"
          retention-days: 30

  merge-e2e-reports:
    name: Merge E2E Reports
    runs-on: ubuntu-latest
    if: ${{ always() && !cancelled() && github.event_name == 'pull_request' }}
    needs: test-e2e
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: true

      - name: Download E2E blob reports
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: blob-report-*
          path: examples/tests/e2e/output/all-blob-reports
          merge-multiple: true

      - name: Merge E2E reports
        working-directory: examples
        run: npx playwright merge-reports --reporter html ./tests/e2e/output/all-blob-reports

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: examples/playwright-report
          if-no-files-found: "warn"
          retention-days: 30

  # runs heavy Lighthouse tests for the examples subdirectory (+ container setup)
  test-lighthouse:
    name: Lighthouse Tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ukorvl/custom-github-actions-playwright:latest@sha256:2b6d906960e2d2a9a9980a309ca8182bf319ada617bd25b27dc40d6e83ced409
      options: --user pwuser
    if: github.event_name == 'pull_request'
    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          setup-node: false # don't need to setup node, it's already in the container

      - name: Build
        uses: ./.github/actions/build

      - name: Run Lighthouse tests
        working-directory: examples
        run: |
          export CI=true
          npm run test:lighthouse
