version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    exclude-paths:
      - "examples/src/samples/*/sandbox/**"
    ignore:
      - dependency-name: "lightweight-charts"
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@rslib/core"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "rsbuild-plugin-dts"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-minor"]
      - dependency-name: "@playwright/test"
        update-types: ["version-update:semver-minor"]
    groups:
      react-packages:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    labels:
      - "dependencies"
  - package-ecosystem: "npm"
    directories:
      - "/examples/src/samples/*/sandbox"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      sandbox-packages:
        patterns:
          - "*"
        group-by: "dependency-name"
    labels:
      - "dependencies"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
