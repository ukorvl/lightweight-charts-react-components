name: "Validate GitHub config"
description: "Validates GitHub workflows, actions, and policy configuration"

runs:
  using: "composite"
  steps:
    - name: Validate workflows and actions
      uses: mpalmer/action-validator@c994f427b7c42cd5ecb1bc9315cb91c3d7d72e3d # v0.9.0
      with:
        version: 0.9.0

    - name: Run zizmor
      uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
      with:
        advanced-security: false
        min-severity: medium
        min-confidence: medium
