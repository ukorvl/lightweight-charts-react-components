name: "Install dependencies"
description: "Prepare repository and all dependencies"

inputs:
  npm-min-version:
    description: "Minimum npm version required by the repository"
    default: "11.10.0"
  npm-upgrade-version:
    description: "npm version to install when the runner version is too old"
    default: "11.14.1"
  setup-node:
    description: "Setup Node.js environment"
    default: "true"
    required: false

runs:
  using: "composite"
  steps:
    - name: Setup nodejs
      if: ${{ inputs.setup-node == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: "npm"
        node-version-file: ".nvmrc"

    - name: Install dependencies
      run: npm ci --ignore-scripts --audit=false
      shell: bash
